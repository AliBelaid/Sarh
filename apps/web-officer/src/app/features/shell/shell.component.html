<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="shell__nav" position="end">
    <div class="brand">
      <span class="brand__title">صرح</span>
      <span class="brand__sub">لوحة موظّف السجل — صرح لتوثيق العقاري</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>اللوحة</span>
      </a>
      <a mat-list-item routerLink="/queue" routerLinkActive="active">
        <mat-icon matListItemIcon>pending_actions</mat-icon>
        <span matListItemTitle>طابور المراجعة</span>
      </a>
      <a mat-list-item routerLink="/approvals" routerLinkActive="active">
        <mat-icon matListItemIcon>verified</mat-icon>
        <span matListItemTitle>اعتماداتي</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="shell__toolbar">
      <span class="spacer"></span>
      @if (profile()) {
        <span class="who">{{ profile()?.user?.email }}</span>
      }
      <button mat-icon-button (click)="signOut()" aria-label="تسجيل الخروج">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>
    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
