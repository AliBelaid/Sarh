<h1 class="page-title">لوحة الموظّف</h1>
<p class="page-sub">نظرة سريعة على طابور العمل في منطقتك.</p>

<div class="kpi-grid">
  <a routerLink="/queue" [queryParams]="{ status: 'pending' }">
    <mat-card class="kpi">
      <mat-icon class="kpi__icon">pending_actions</mat-icon>
      <div class="kpi__num">{{ pendingCount() }}</div>
      <div class="kpi__label">قيد المراجعة</div>
    </mat-card>
  </a>

  <a routerLink="/queue">
    <mat-card class="kpi">
      <mat-icon class="kpi__icon">work_history</mat-icon>
      <div class="kpi__num">{{ myQueue() }}</div>
      <div class="kpi__label">في طابوري</div>
    </mat-card>
  </a>

  <a routerLink="/queue" [queryParams]="{ status: 'needs_clarification' }">
    <mat-card class="kpi">
      <mat-icon class="kpi__icon">help_center</mat-icon>
      <div class="kpi__num">{{ needsClarificationCount() }}</div>
      <div class="kpi__label">بحاجة إلى توضيح</div>
    </mat-card>
  </a>

  <a routerLink="/approvals">
    <mat-card class="kpi">
      <mat-icon class="kpi__icon">verified</mat-icon>
      <div class="kpi__num">{{ todaysApprovals() }}</div>
      <div class="kpi__label">اعتمادات اليوم</div>
    </mat-card>
  </a>
</div>
