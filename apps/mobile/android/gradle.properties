org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# The Kotlin incremental compiler computes relative paths between source
# files; it crashes when the project and the pub cache live on different
# Windows drive letters (D:\Sarh vs C:\Users\...\Pub\Cache). Disabling
# IC trades a slower second build for one that actually completes.
kotlin.incremental=false
