name: sijilli_mobile
description: Sijilli — Libyan Real Estate Registry & Digital Identity (citizen mobile app)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0

  # HTTP + persistence
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # Supabase (real-time auth + tables for demo flow + citizen lookups
  # without the NestJS API in the loop).
  supabase_flutter: ^2.5.6

  # NFC (NTAG 424 DNA tap on login)
  flutter_nfc_kit: ^3.5.2

  # Maps + geometry
  mapbox_maps_flutter: ^2.3.0
  latlong2: ^0.9.1

  # Camera + files
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # QR codes (wallet share + verify scan)
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Misc
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/branding/

  # Sijilli ships with bundled Arabic + Latin font support so text in
  # both scripts renders consistently across Android/iOS without
  # depending on system fonts.
  fonts:
    # Cairo from Google Fonts is now a variable font (slnt + wght axes).
    # One file covers every weight — we declare regular + bold so Flutter
    # picks the right cut at runtime without shipping two static TTFs.
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Variable.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Variable.ttf
          weight: 700
