<div class="login-shell" dir="rtl">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <img src="assets/branding/logo-sarh.svg" alt="Sarh" />
      <div class="brand-text">
        <strong>صرح</strong>
        <small>صرح لتوثيق العقاري · Sarh</small>
      </div>
    </a>
    <nav class="nav">
      <a class="nav-link" routerLink="/" (click)="goHome(); $event.preventDefault()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3z"/>
        </svg>
        الصفحة الرئيسية
      </a>
    </nav>
  </header>

  <main class="login-page">
    <div class="bg-art" aria-hidden="true">
      <img src="assets/branding/login-background.svg" alt="" />
      <div class="bg-art__veil"></div>
    </div>

    <mat-card class="login-card">
      <div class="login-card__crest">
        <img src="assets/branding/logo-sarh.svg" alt="" />
      </div>
      <mat-card-header>
        <mat-card-title>دخول لوحة الإدارة</mat-card-title>
        <mat-card-subtitle>للموظفين والمسؤولين فقط</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="full">
            <mat-label>البريد الإلكتروني</mat-label>
            <input matInput type="email" [(ngModel)]="email" name="email" dir="ltr" required />
          </mat-form-field>
          <mat-form-field appearance="outline" class="full">
            <mat-label>كلمة المرور</mat-label>
            <input matInput type="password" [(ngModel)]="password" name="password" dir="ltr" required />
          </mat-form-field>
          @if (error()) { <div class="error">{{ error() }}</div> }
          <button mat-flat-button color="primary" type="submit" [disabled]="busy()" class="full">
            @if (busy()) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else { دخول }
          </button>
        </form>
        <small class="hint">إنشاء الحسابات يتم من قِبل المسؤول فقط عبر صفحة الموظفين.</small>
        <div class="demo">
          <hr />
          <button mat-stroked-button class="full" type="button"
                  [disabled]="busy()" (click)="enterDemo()">
            دخول تجريبي كمستخدم حقيقي
          </button>
          <small>يُسجِّل الدخول بحساب صرح التجريبي على Supabase ويعرض البيانات الفعلية.</small>
        </div>
      </mat-card-content>
    </mat-card>
  </main>
</div>
