<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened position="end" class="shell__nav">
    <div class="brand">
      <span class="brand__title">صرح</span>
      <span class="brand__sub">لوحة الإدارة — صرح لتوثيق العقاري</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/app/officers" routerLinkActive="active">
        <mat-icon matListItemIcon>badge</mat-icon><span matListItemTitle>الموظّفون</span>
      </a>
      <a mat-list-item routerLink="/app/citizens" routerLinkActive="active">
        <mat-icon matListItemIcon>people</mat-icon><span matListItemTitle>المواطنون</span>
      </a>
      <a mat-list-item routerLink="/app/digital-ids" routerLinkActive="active">
        <mat-icon matListItemIcon>credit_card</mat-icon><span matListItemTitle>الهويّات الرقمية</span>
      </a>
      <a mat-list-item routerLink="/app/properties" routerLinkActive="active">
        <mat-icon matListItemIcon>home_work</mat-icon><span matListItemTitle>العقارات</span>
      </a>
      <a mat-list-item routerLink="/app/notifications" routerLinkActive="active">
        <mat-icon matListItemIcon>notifications</mat-icon><span matListItemTitle>الإشعارات</span>
      </a>
      <a mat-list-item routerLink="/app/audit" routerLinkActive="active">
        <mat-icon matListItemIcon>history</mat-icon><span matListItemTitle>سجلّ التدقيق</span>
      </a>
      <a mat-list-item routerLink="/app/reports" routerLinkActive="active">
        <mat-icon matListItemIcon>insights</mat-icon><span matListItemTitle>التقارير</span>
      </a>
      <a mat-list-item routerLink="/app/settings" routerLinkActive="active">
        <mat-icon matListItemIcon>settings</mat-icon><span matListItemTitle>الإعدادات</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar class="shell__toolbar">
      <span class="spacer"></span>
      @if (profile()) {
        <span class="who">{{ profile()?.user?.email }}</span>
      }
      <button mat-icon-button (click)="signOut()"><mat-icon>logout</mat-icon></button>
    </mat-toolbar>
    <main class="shell__main"><router-outlet /></main>
  </mat-sidenav-content>
</mat-sidenav-container>
