<h1 class="page-title">إعدادات النظام</h1>

<mat-card>
  <mat-card-content class="grid">
    <mat-form-field appearance="outline">
      <mat-label>رابط بوّابة الرسائل القصيرة</mat-label>
      <input matInput [value]="smsGatewayUrl()" (input)="smsGatewayUrl.set($any($event.target).value)" dir="ltr" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>صلاحية البطاقة (سنوات)</mat-label>
      <input matInput type="number" [value]="cardValidityYears()" (input)="cardValidityYears.set(+$any($event.target).value)" dir="ltr" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>رسم إعادة التقديم (د.ل)</mat-label>
      <input matInput type="number" [value]="rejectionFeeLyd()" (input)="rejectionFeeLyd.set(+$any($event.target).value)" dir="ltr" />
    </mat-form-field>
    <div class="actions">
      <button mat-flat-button color="primary" (click)="save()" [disabled]="saving()">حفظ</button>
    </div>
  </mat-card-content>
</mat-card>
