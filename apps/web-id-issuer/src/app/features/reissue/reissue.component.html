<h1 class="step-title">إعادة إصدار بطاقة</h1>
<p class="muted">
  أدخل معرّف البطاقة المفقودة/التالفة وسبب الإعادة. سيتم إلغاء البطاقة الحالية ثم
  بدء معالج إصدار جديد بنفس الرقم الرقمي للمواطن.
</p>

@if (busy()) { <mat-progress-bar mode="indeterminate"></mat-progress-bar> }

<mat-card>
  <mat-card-content>
    <mat-form-field appearance="outline" class="full">
      <mat-label>معرّف البطاقة (UUID)</mat-label>
      <input matInput [(ngModel)]="cardId" name="cardId" dir="ltr" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>سبب الإعادة</mat-label>
      <textarea matInput rows="3" [(ngModel)]="reason" name="reason"></textarea>
    </mat-form-field>
    <div class="actions">
      <button mat-flat-button color="primary" [disabled]="busy()" (click)="submit()">
        تنفيذ
      </button>
    </div>
  </mat-card-content>
</mat-card>
