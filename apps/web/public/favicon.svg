<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Sijilli Logo">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A14"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4D77A"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B7A1E"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E70013"/>
      <stop offset="100%" stop-color="#A8000E"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2BB857"/>
      <stop offset="100%" stop-color="#1A7234"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagonal seal -->
  <polygon points="300,40 520,170 520,430 300,560 80,430 80,170"
           fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Inner hexagonal frame -->
  <polygon points="300,75 490,185 490,415 300,525 110,415 110,185"
           fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Libyan flag stripes (top accent) -->
  <rect x="180" y="100" width="240" height="6" fill="#E70013"/>
  <rect x="180" y="108" width="240" height="14" fill="#000000"/>
  <rect x="180" y="124" width="240" height="6" fill="#239E46"/>

  <!-- Libyan flag stripes (bottom accent) -->
  <rect x="180" y="470" width="240" height="6" fill="#239E46"/>
  <rect x="180" y="478" width="240" height="14" fill="#000000"/>
  <rect x="180" y="496" width="240" height="6" fill="#E70013"/>

  <!-- Central icon: stylized house + ID + crescent -->
  <g transform="translate(300, 300)" filter="url(#goldGlow)">
    <!-- Geometric land/foundation -->
    <polygon points="-110,90 110,90 130,110 -130,110" fill="url(#greenGrad)"/>

    <!-- House body -->
    <rect x="-80" y="-20" width="160" height="110" fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="2"/>

    <!-- House roof in red -->
    <polygon points="-95,-20 0,-100 95,-20" fill="url(#redGrad)" stroke="url(#goldGrad)" stroke-width="2"/>

    <!-- Door (ID card silhouette) -->
    <rect x="-25" y="20" width="50" height="70" fill="url(#goldGrad)" rx="3"/>
    <circle cx="0" cy="40" r="8" fill="#0F1A14"/>
    <rect x="-15" y="55" width="30" height="3" fill="#0F1A14"/>
    <rect x="-15" y="62" width="20" height="2" fill="#0F1A14"/>
    <rect x="-15" y="68" width="25" height="2" fill="#0F1A14"/>

    <!-- Windows -->
    <rect x="-65" y="0" width="25" height="25" fill="url(#goldGrad)" opacity="0.85"/>
    <rect x="40" y="0" width="25" height="25" fill="url(#goldGrad)" opacity="0.85"/>

    <!-- Crescent and star above roof -->
    <g transform="translate(0, -135)">
      <path d="M -18,0 A 18,18 0 1,0 -18,0.1 A 13,13 0 1,1 -10,-10 Z"
            fill="url(#goldGrad)" transform="rotate(-30)"/>
      <polygon points="8,-4 12,4 20,4 14,9 16,17 8,12 0,17 2,9 -4,4 4,4"
               fill="url(#goldGrad)" transform="translate(8,0) scale(0.8)"/>
    </g>
  </g>

  <!-- Arabic name صرح -->
  <text x="300" y="430" text-anchor="middle"
        font-family="'Amiri', 'Scheherazade New', 'Noto Naskh Arabic', serif"
        font-size="92" font-weight="700" fill="url(#goldGrad)"
        letter-spacing="4">صرح</text>

  <!-- Latin transliteration -->
  <text x="300" y="475" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', serif"
        font-size="14" font-weight="400" fill="#D4AF37"
        letter-spacing="8">SARH</text>
  <text x="300" y="495" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', serif"
        font-size="10" font-weight="400" fill="#D4AF37"
        letter-spacing="4" opacity="0.85">REAL ESTATE DOCUMENTATION</text>
</svg>
