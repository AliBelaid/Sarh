<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="system-ui,'Segoe UI',Tahoma,sans-serif" direction="rtl">
  <rect width="1200" height="760" fill="#FAFAF9"/>

  <!-- Sidebar shadow -->
  <rect x="980" y="0" width="220" height="760" fill="#0F172A"/>
  <rect x="980" y="0" width="220" height="760" fill="rgba(255,255,255,0.04)"/>
  <text x="1170" y="48" font-size="16" font-weight="700" fill="#F97316" text-anchor="end">صَرح</text>
  <line x1="1000" y1="86" x2="1180" y2="86" stroke="rgba(255,255,255,0.08)"/>
  <rect x="996" y="160" width="190" height="34" rx="8" fill="rgba(249,115,22,0.18)"/>
  <text x="1170" y="181" font-size="12" font-weight="600" fill="#F97316" text-anchor="end">عقاراتي</text>
  <text x="1170" y="220" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">بطاقتي الرقميّة</text>

  <!-- Topbar -->
  <rect x="0" y="0" width="980" height="62" fill="#fff" stroke="#E5E7EB"/>
  <text x="950" y="32" font-size="13" fill="#0F172A" text-anchor="end">صَرح / عقاراتي / تسجيل جديد</text>

  <!-- Page header -->
  <text x="950" y="100" font-size="20" font-weight="700" fill="#0F172A" text-anchor="end">تسجيل عقار جديد</text>
  <text x="950" y="122" font-size="11.5" fill="rgba(15,23,42,0.55)" text-anchor="end">أكمل بيانات القطعة وحدّد الحدود على الخريطة ثم أرسل الطلب للمراجعة.</text>

  <!-- Form card (right) -->
  <rect x="500" y="148" width="458" height="592" rx="14" fill="#fff" stroke="#E5E7EB"/>

  <!-- Field rows -->
  <g font-size="11">
    <text x="940" y="180" fill="rgba(15,23,42,0.6)" text-anchor="end">نوع العقار</text>
    <rect x="520" y="190" width="418" height="36" rx="8" fill="#fff" stroke="#E5E7EB"/>
    <text x="930" y="213" fill="#0F172A" text-anchor="end">سكني</text>
    <path d="M 540 205 l 6 6 6 -6" stroke="rgba(15,23,42,0.5)" fill="none" stroke-width="1.4"/>

    <text x="940" y="248" fill="rgba(15,23,42,0.6)" text-anchor="end">المنطقة</text>
    <rect x="520" y="258" width="418" height="36" rx="8" fill="#fff" stroke="#E5E7EB"/>
    <text x="930" y="281" fill="#0F172A" text-anchor="end">طرابلس</text>

    <text x="940" y="316" fill="rgba(15,23,42,0.6)" text-anchor="end">العنوان</text>
    <rect x="520" y="326" width="418" height="36" rx="8" fill="#fff" stroke="#E5E7EB"/>
    <text x="930" y="349" fill="#0F172A" text-anchor="end">حي الأندلس، شارع الزاوية</text>

    <text x="730" y="384" fill="rgba(15,23,42,0.6)" text-anchor="end">رقم القطعة</text>
    <rect x="520" y="394" width="200" height="36" rx="8" fill="#fff" stroke="#E5E7EB"/>
    <text x="710" y="417" fill="#0F172A" text-anchor="end" direction="ltr">2174</text>

    <text x="940" y="384" fill="rgba(15,23,42,0.6)" text-anchor="end">رقم المخطّط</text>
    <rect x="738" y="394" width="200" height="36" rx="8" fill="#fff" stroke="#E5E7EB"/>
    <text x="930" y="417" fill="#0F172A" text-anchor="end" direction="ltr">B-37</text>

    <text x="940" y="452" fill="rgba(15,23,42,0.6)" text-anchor="end">المساحة (م²)</text>
    <rect x="520" y="462" width="200" height="36" rx="8" fill="#fff" stroke="#E5E7EB"/>
    <text x="710" y="485" fill="#0F172A" text-anchor="end" direction="ltr">425.50</text>
    <text x="930" y="485" font-size="9" fill="rgba(8,145,178,0.85)" text-anchor="end">✓ يطابق المضلّع المرسوم</text>
  </g>

  <!-- Documents -->
  <text x="940" y="520" font-size="11" fill="rgba(15,23,42,0.6)" text-anchor="end">المستندات المطلوبة</text>
  <g font-size="10">
    <rect x="520" y="530" width="418" height="34" rx="8" fill="rgba(8,145,178,0.06)" stroke="rgba(8,145,178,0.3)"/>
    <text x="930" y="551" fill="#0F172A" text-anchor="end">✓ صحيفة الملكية الورقية القديمة</text>
    <text x="540" y="551" font-size="9" fill="rgba(15,23,42,0.45)">deed-old.pdf · 2.1 MB</text>

    <rect x="520" y="572" width="418" height="34" rx="8" fill="rgba(8,145,178,0.06)" stroke="rgba(8,145,178,0.3)"/>
    <text x="930" y="593" fill="#0F172A" text-anchor="end">✓ وثيقة الميراث</text>

    <rect x="520" y="614" width="418" height="34" rx="8" fill="rgba(249,115,22,0.06)" stroke="rgba(249,115,22,0.4)" stroke-dasharray="4 3"/>
    <text x="930" y="635" fill="rgba(15,23,42,0.55)" text-anchor="end">+ إضافة شهادة جوار (اختياري)</text>
  </g>

  <!-- Submit -->
  <rect x="800" y="678" width="138" height="42" rx="8" fill="#0F172A"/>
  <text x="869" y="704" font-size="12" font-weight="700" fill="#F97316" text-anchor="middle">إرسال الطلب →</text>
  <rect x="660" y="678" width="120" height="42" rx="8" fill="#fff" stroke="#E5E7EB"/>
  <text x="720" y="704" font-size="12" font-weight="600" fill="#0F172A" text-anchor="middle">حفظ كمسودة</text>

  <!-- Map (left) -->
  <rect x="22" y="148" width="458" height="592" rx="14" fill="#fff" stroke="#E5E7EB"/>
  <text x="450" y="178" font-size="13" font-weight="700" fill="#0F172A" text-anchor="end">حدود القطعة</text>
  <text x="450" y="194" font-size="10" fill="rgba(15,23,42,0.55)" text-anchor="end">انقر على الخريطة لإضافة نقاط (بحد أدنى 4)</text>

  <!-- Map area -->
  <rect x="40" y="210" width="424" height="450" rx="10" fill="#e8eef0"/>
  <!-- fake roads -->
  <line x1="40" y1="320" x2="464" y2="290" stroke="#fff" stroke-width="6" opacity="0.7"/>
  <line x1="40" y1="490" x2="464" y2="510" stroke="#fff" stroke-width="6" opacity="0.7"/>
  <line x1="160" y1="210" x2="200" y2="660" stroke="#fff" stroke-width="6" opacity="0.7"/>
  <line x1="340" y1="210" x2="370" y2="660" stroke="#fff" stroke-width="6" opacity="0.7"/>

  <!-- Polygon -->
  <polygon points="200,360 360,350 370,470 210,490" fill="rgba(249,115,22,0.25)" stroke="#F97316" stroke-width="2"/>
  <g fill="#F97316" stroke="#fff" stroke-width="2">
    <circle cx="200" cy="360" r="6"/>
    <circle cx="360" cy="350" r="6"/>
    <circle cx="370" cy="470" r="6"/>
    <circle cx="210" cy="490" r="6"/>
  </g>

  <!-- Map controls -->
  <rect x="380" y="230" width="70" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="440" y="248" font-size="10" font-weight="600" fill="#0F172A" text-anchor="end">تراجع</text>
  <rect x="380" y="264" width="70" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="440" y="282" font-size="10" font-weight="600" fill="#0F172A" text-anchor="end">مسح</text>

  <!-- Computed area chip -->
  <rect x="55" y="615" width="186" height="32" rx="16" fill="rgba(8,145,178,0.12)" stroke="rgba(8,145,178,0.5)"/>
  <text x="232" y="636" font-size="11" font-weight="700" fill="#0891B2" text-anchor="end">المساحة المحسوبة: 425.5 م²</text>

  <text x="20" y="745" font-size="10" fill="rgba(15,23,42,0.4)" direction="ltr">Wireframe · Citizen — register new property</text>
</svg>
