<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="system-ui,'Segoe UI',Tahoma,sans-serif" direction="rtl">
  <defs>
    <linearGradient id="sb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Page bg -->
  <rect width="1200" height="760" fill="#FAFAF9"/>

  <!-- Sidebar (right side for RTL) -->
  <rect x="980" y="0" width="220" height="760" fill="url(#sb)"/>
  <text x="1170" y="48" font-size="16" font-weight="700" fill="#F97316" text-anchor="end">صَرح</text>
  <text x="1170" y="66" font-size="9" fill="rgba(249,115,22,0.55)" letter-spacing="2" text-anchor="end">SARH · LIBYA</text>
  <line x1="1000" y1="86" x2="1180" y2="86" stroke="rgba(255,255,255,0.08)"/>

  <!-- Nav items -->
  <g font-size="12" font-weight="600">
    <rect x="996" y="100" width="190" height="34" rx="8" fill="rgba(249,115,22,0.18)"/>
    <circle cx="1180" cy="117" r="2.4" fill="#F97316"/>
    <text x="1170" y="121" fill="#F97316" text-anchor="end">لوحة التحكم</text>

    <text x="1170" y="158" fill="rgba(255,255,255,0.75)" text-anchor="end">عقاراتي</text>
    <text x="1170" y="190" fill="rgba(255,255,255,0.75)" text-anchor="end">بطاقتي الرقميّة</text>
    <text x="1170" y="222" fill="rgba(255,255,255,0.75)" text-anchor="end">طابور المراجعة</text>
    <text x="1170" y="254" fill="rgba(255,255,255,0.75)" text-anchor="end">القرارات</text>

    <text x="1170" y="306" font-size="9" font-weight="700" letter-spacing="2" fill="rgba(249,115,22,0.5)" text-anchor="end">إدارة</text>
    <text x="1170" y="330" fill="rgba(255,255,255,0.75)" text-anchor="end">العقارات</text>
    <text x="1170" y="362" fill="rgba(255,255,255,0.75)" text-anchor="end">المواطنون</text>
    <text x="1170" y="394" fill="rgba(255,255,255,0.75)" text-anchor="end">سجلّ التدقيق</text>
    <text x="1170" y="426" fill="rgba(255,255,255,0.75)" text-anchor="end">التقارير</text>
  </g>

  <!-- User pill -->
  <rect x="1000" y="690" width="172" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="1156" cy="715" r="14" fill="#F97316"/>
  <text x="1156" y="720" font-size="11" fill="#0F172A" text-anchor="middle">ع</text>
  <text x="1130" y="710" font-size="11" fill="#FAFAF9" text-anchor="end">علي بلعيد</text>
  <text x="1130" y="724" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="end">مسؤول عام</text>

  <!-- Topbar -->
  <rect x="0" y="0" width="980" height="62" fill="#fff" stroke="#E5E7EB"/>
  <text x="950" y="32" font-size="13" fill="#0F172A" text-anchor="end">صَرح / لوحة التحكم</text>
  <text x="950" y="48" font-size="10" fill="rgba(15,23,42,0.55)" text-anchor="end">الإثنين، 5 مايو 2026</text>

  <!-- Hero greeting -->
  <rect x="22" y="84" width="936" height="100" rx="14" fill="#0F172A"/>
  <rect x="22" y="84" width="936" height="100" rx="14" fill="url(#sb)" opacity="0.5"/>
  <text x="940" y="120" font-size="20" font-weight="700" fill="#F97316" text-anchor="end">صباح الخير، علي</text>
  <text x="940" y="142" font-size="11.5" fill="rgba(255,255,255,0.7)" text-anchor="end">آخر تحديث منذ 4 دقائق · 12 طلب جديد بانتظار قرار</text>
  <rect x="40" y="100" width="100" height="22" rx="11" fill="rgba(249,115,22,0.18)"/>
  <circle cx="58" cy="111" r="3" fill="#F97316"/>
  <text x="76" y="115" font-size="10" fill="#F97316" text-anchor="middle">مسؤول عام</text>

  <!-- KPI tiles row -->
  <g>
    <rect x="22" y="200" width="220" height="100" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="232" y="223" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">إجمالي العقارات</text>
    <text x="232" y="263" font-size="28" font-weight="800" fill="#0F172A" text-anchor="end">1,847</text>
    <text x="232" y="286" font-size="10" fill="#0891B2" text-anchor="end">▲ +12 هذا الأسبوع</text>

    <rect x="262" y="200" width="220" height="100" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="472" y="223" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">قيد المراجعة</text>
    <text x="472" y="263" font-size="28" font-weight="800" fill="#f59e0b" text-anchor="end">38</text>
    <text x="472" y="286" font-size="10" fill="rgba(15,23,42,0.55)" text-anchor="end">متوسط الانتظار: 2.1 يوم</text>

    <rect x="502" y="200" width="220" height="100" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="712" y="223" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">معتمد</text>
    <text x="712" y="263" font-size="28" font-weight="800" fill="#0891B2" text-anchor="end">1,520</text>
    <text x="712" y="286" font-size="10" fill="rgba(15,23,42,0.55)" text-anchor="end">82.3% من الإجمالي</text>

    <rect x="742" y="200" width="216" height="100" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="948" y="223" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">بطاقات نشطة</text>
    <text x="948" y="263" font-size="28" font-weight="800" fill="#0F172A" text-anchor="end">9,412</text>
    <text x="948" y="286" font-size="10" fill="#DC2626" text-anchor="end">⚠ 124 ستنتهي خلال 90 يوماً</text>
  </g>

  <!-- Tiles grid -->
  <g>
    <rect x="22" y="320" width="460" height="140" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <rect x="450" y="338" width="22" height="22" rx="6" fill="rgba(249,115,22,0.14)"/>
    <text x="461" y="354" font-size="13" fill="#F97316" text-anchor="middle">📋</text>
    <text x="442" y="362" font-size="14" font-weight="700" fill="#0F172A" text-anchor="end">طابور المراجعة</text>
    <text x="442" y="384" font-size="11" fill="rgba(15,23,42,0.55)" text-anchor="end">طلبات تسجيل العقارات المنتظرة لقرار من الموظف.</text>
    <text x="442" y="402" font-size="11" fill="rgba(15,23,42,0.55)" text-anchor="end">يدعم تصفية بالحالة والنوع، خرائط Leaflet لكل قطعة.</text>
    <text x="442" y="438" font-size="11" font-weight="700" fill="#0F172A" text-anchor="end">فتح الطابور ←</text>

    <rect x="498" y="320" width="460" height="140" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <rect x="926" y="338" width="22" height="22" rx="6" fill="rgba(8,145,178,0.14)"/>
    <text x="937" y="354" font-size="13" fill="#0891B2" text-anchor="middle">📊</text>
    <text x="918" y="362" font-size="14" font-weight="700" fill="#0F172A" text-anchor="end">التقارير</text>
    <text x="918" y="384" font-size="11" fill="rgba(15,23,42,0.55)" text-anchor="end">مؤشرات حية: عقارات معتمدة/مرفوضة، توزيع المناطق.</text>
    <text x="918" y="402" font-size="11" fill="rgba(15,23,42,0.55)" text-anchor="end">رسم بياني للتوزيع حسب النوع والحالة والمنطقة.</text>
    <text x="918" y="438" font-size="11" font-weight="700" fill="#0F172A" text-anchor="end">عرض ←</text>
  </g>

  <!-- Mini distribution chart -->
  <g>
    <rect x="22" y="480" width="936" height="240" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="940" y="510" font-size="13" font-weight="700" fill="#0F172A" text-anchor="end">التوزيع حسب المنطقة (آخر 90 يوم)</text>
    <text x="940" y="528" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">النسبة من إجمالي العقارات المعتمدة</text>

    <!-- bars -->
    <g>
      <rect x="40" y="560" width="60" height="120" fill="#F97316" opacity="0.85"/>
      <rect x="120" y="600" width="60" height="80" fill="#F97316" opacity="0.7"/>
      <rect x="200" y="580" width="60" height="100" fill="#F97316" opacity="0.85"/>
      <rect x="280" y="630" width="60" height="50" fill="#F97316" opacity="0.55"/>
      <rect x="360" y="640" width="60" height="40" fill="#F97316" opacity="0.45"/>
      <rect x="440" y="610" width="60" height="70" fill="#F97316" opacity="0.65"/>
      <rect x="520" y="620" width="60" height="60" fill="#F97316" opacity="0.6"/>
      <rect x="600" y="650" width="60" height="30" fill="#F97316" opacity="0.4"/>
      <rect x="680" y="635" width="60" height="45" fill="#F97316" opacity="0.5"/>
      <rect x="760" y="645" width="60" height="35" fill="#F97316" opacity="0.45"/>
      <rect x="840" y="655" width="60" height="25" fill="#F97316" opacity="0.4"/>
    </g>
    <g font-size="9.5" fill="rgba(15,23,42,0.6)" text-anchor="middle">
      <text x="70" y="700">طرابلس</text>
      <text x="150" y="700">بنغازي</text>
      <text x="230" y="700">مصراتة</text>
      <text x="310" y="700">سرت</text>
      <text x="390" y="700">الزاوية</text>
      <text x="470" y="700">الخمس</text>
      <text x="550" y="700">المرج</text>
      <text x="630" y="700">سبها</text>
      <text x="710" y="700">درنة</text>
      <text x="790" y="700">طبرق</text>
      <text x="870" y="700">غات</text>
    </g>
  </g>

  <text x="20" y="745" font-size="10" fill="rgba(15,23,42,0.4)" direction="ltr">Wireframe · Admin dashboard (Sarh)</text>
</svg>
