<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="system-ui,'Segoe UI',Tahoma,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(249,115,22,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="url(#bgGrad)"/>
  <rect width="1100" height="720" fill="url(#grid)"/>

  <!-- Decorative pulses -->
  <circle cx="180" cy="180" r="120" fill="#F97316" opacity="0.05"/>
  <circle cx="950" cy="600" r="160" fill="#F97316" opacity="0.05"/>
  <circle cx="900" cy="120" r="60" fill="#0891B2" opacity="0.06"/>

  <!-- Glass card -->
  <rect x="350" y="120" width="400" height="500" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(249,115,22,0.25)" stroke-width="1"/>

  <!-- Logo ring -->
  <circle cx="550" cy="190" r="32" fill="rgba(249,115,22,0.15)" stroke="#F97316" stroke-width="1.5"/>
  <text x="550" y="198" font-size="22" font-weight="700" fill="#F97316" text-anchor="middle">س</text>

  <!-- Title -->
  <text x="550" y="260" font-size="22" font-weight="700" fill="#FAFAF9" text-anchor="middle">صَرح · Sarh</text>
  <text x="550" y="285" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="middle">سجل العقارات الليبي والهوية الرقمية</text>

  <!-- Email -->
  <text x="730" y="335" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">البريد الإلكتروني</text>
  <rect x="380" y="345" width="340" height="40" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="395" y="370" font-size="13" fill="rgba(255,255,255,0.45)" direction="ltr">demo&#64;sarh.ly</text>

  <!-- Password -->
  <text x="730" y="410" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">كلمة المرور</text>
  <rect x="380" y="420" width="340" height="40" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="395" y="445" font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="2">••••••••••</text>
  <circle cx="700" cy="440" r="10" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.4"/>

  <!-- Sign-in button -->
  <rect x="380" y="490" width="340" height="44" rx="8" fill="#F97316"/>
  <text x="550" y="518" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">تسجيل الدخول</text>

  <!-- Quick fill chips -->
  <text x="550" y="565" font-size="10.5" fill="rgba(255,255,255,0.5)" text-anchor="middle">جرّب بحساب تجريبي:</text>

  <g font-size="11" font-weight="600">
    <rect x="380" y="575" width="78" height="28" rx="14" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.4)"/>
    <circle cx="395" cy="589" r="3" fill="#0891B2"/>
    <text x="445" y="593" fill="#FAFAF9" text-anchor="middle">مواطن</text>

    <rect x="467" y="575" width="78" height="28" rx="14" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.4)"/>
    <circle cx="482" cy="589" r="3" fill="#DC2626"/>
    <text x="532" y="593" fill="#FAFAF9" text-anchor="middle">مسؤول</text>

    <rect x="554" y="575" width="78" height="28" rx="14" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.4)"/>
    <circle cx="569" cy="589" r="3" fill="#3b82f6"/>
    <text x="619" y="593" fill="#FAFAF9" text-anchor="middle">موظف</text>

    <rect x="641" y="575" width="78" height="28" rx="14" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.4)"/>
    <circle cx="656" cy="589" r="3" fill="#F97316"/>
    <text x="706" y="593" fill="#FAFAF9" text-anchor="middle">إصدار</text>
  </g>

  <!-- Footer chrome -->
  <text x="550" y="660" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">عربي / English</text>
  <text x="550" y="690" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">© 2026 LVCT — جميع الحقوق محفوظة</text>

  <!-- Caption -->
  <text x="20" y="710" font-size="10" fill="rgba(255,255,255,0.35)">Wireframe · Login screen (Sarh)</text>
</svg>
