<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="system-ui,'Segoe UI',Tahoma,sans-serif" direction="rtl">
  <rect width="1200" height="820" fill="#FAFAF9"/>

  <!-- Sidebar -->
  <rect x="980" y="0" width="220" height="820" fill="#0F172A"/>
  <rect x="980" y="0" width="220" height="820" fill="rgba(255,255,255,0.04)"/>
  <text x="1170" y="46" font-size="16" font-weight="700" fill="#F97316" text-anchor="end">صَرح</text>
  <line x1="1000" y1="80" x2="1180" y2="80" stroke="rgba(255,255,255,0.08)"/>
  <text x="1170" y="118" font-size="10" letter-spacing="2" fill="rgba(255,255,255,0.4)" text-anchor="end">DEPARTMENT MANAGER</text>
  <text x="1170" y="160" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">قائمة الاعتمادات</text>
  <rect x="996" y="180" width="190" height="34" rx="8" fill="rgba(249,115,22,0.18)"/>
  <text x="1170" y="201" font-size="12" font-weight="600" fill="#F97316" text-anchor="end">رخصة العقار · NFT</text>
  <text x="1170" y="240" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">سجل الرخص</text>
  <text x="1170" y="270" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">سجل التدقيق</text>

  <!-- Topbar -->
  <rect x="0" y="0" width="980" height="62" fill="#fff" stroke="#E5E7EB"/>
  <text x="950" y="32" font-size="13" fill="#0F172A" text-anchor="end">صَرح / الاعتمادات / إصدار رخصة عقار رقمية</text>
  <rect x="20" y="20" width="80" height="22" rx="11" fill="rgba(8,145,178,0.12)"/>
  <text x="60" y="35" font-size="10" font-weight="700" fill="#0891B2" text-anchor="middle">قيد المراجعة</text>

  <!-- Page header -->
  <text x="950" y="100" font-size="20" font-weight="700" fill="#0F172A" text-anchor="end">إصدار رخصة عقار رقمية على البلوكتشين</text>
  <text x="950" y="122" font-size="11.5" fill="rgba(15,23,42,0.55)" text-anchor="end">راجع طلب الاعتماد، أدخل رقم القرار، ثم اضغط «اعتماد وإصدار NFT» لسكّ الرخصة على السلسلة.</text>

  <!-- LEFT: Property summary card -->
  <rect x="20" y="148" width="478" height="392" rx="14" fill="#fff" stroke="#E5E7EB"/>
  <text x="478" y="180" font-size="14" font-weight="700" fill="#0F172A" text-anchor="end">ملخّص العقار</text>
  <line x1="38" y1="194" x2="478" y2="194" stroke="#E5E7EB"/>

  <g font-size="11.5">
    <text x="478" y="222" fill="rgba(15,23,42,0.55)" text-anchor="end">رمز العقار</text>
    <text x="38" y="222" font-size="13" font-weight="700" fill="#0F172A" direction="ltr">PRP-2026-0438</text>

    <text x="478" y="250" fill="rgba(15,23,42,0.55)" text-anchor="end">المالك</text>
    <text x="38" y="250" font-size="12" font-weight="600" fill="#0F172A">علي محمد بلعيد</text>

    <text x="478" y="278" fill="rgba(15,23,42,0.55)" text-anchor="end">DID</text>
    <text x="38" y="278" font-size="11" font-weight="600" fill="#0F172A" direction="ltr">did:sov:LY:9F2k…aB73</text>

    <text x="478" y="306" fill="rgba(15,23,42,0.55)" text-anchor="end">المنطقة</text>
    <text x="38" y="306" font-size="12" font-weight="600" fill="#0F172A">طرابلس · حي الأندلس</text>

    <text x="478" y="334" fill="rgba(15,23,42,0.55)" text-anchor="end">المساحة</text>
    <text x="38" y="334" font-size="12" font-weight="600" fill="#0F172A" direction="ltr">425.50 م²</text>

    <text x="478" y="362" fill="rgba(15,23,42,0.55)" text-anchor="end">SHA-256 لصحيفة الملكية</text>
    <text x="38" y="362" font-size="10.5" font-weight="600" fill="#0F172A" direction="ltr">3a7b…9f02</text>
  </g>

  <!-- Officer recommendation block -->
  <rect x="38" y="384" width="442" height="138" rx="10" fill="rgba(8,145,178,0.06)" stroke="rgba(8,145,178,0.3)"/>
  <text x="464" y="408" font-size="12" font-weight="700" fill="#0891B2" text-anchor="end">توصية موظف التسجيل</text>
  <circle cx="58" cy="404" r="10" fill="#0891B2"/>
  <text x="58" y="408" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">✓</text>
  <text x="464" y="432" font-size="11" fill="rgba(15,23,42,0.7)" text-anchor="end">المراجع: أ. سامي البرغثي · مكتب طرابلس (1408)</text>
  <text x="464" y="454" font-size="10.5" fill="rgba(15,23,42,0.6)" text-anchor="end">«تم التحقق من الإحداثيات بدون أي تعارض مع عقارات معتمدة. الوثائق المرفقة كافية.»</text>
  <text x="464" y="500" font-size="10" fill="rgba(15,23,42,0.55)" text-anchor="end">جميع الفحوصات الفنية اكتملت — الطلب جاهز للاعتماد النهائي وسكّ الرخصة.</text>

  <!-- RIGHT: NFT preview + form -->
  <!-- NFT preview card -->
  <rect x="518" y="148" width="442" height="244" rx="14" fill="#0F172A"/>
  <rect x="518" y="148" width="442" height="244" rx="14" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="60%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#243a31"/>
    </linearGradient>
  </defs>
  <text x="942" y="180" font-size="11" letter-spacing="3" fill="#F97316" text-anchor="end">PROPERTY LICENCE · NFT</text>
  <text x="942" y="218" font-size="22" font-weight="800" fill="#fff" text-anchor="end">رخصة عقارية رقمية</text>

  <!-- Faux geo polygon "art" -->
  <g transform="translate(536,236)" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.7">
    <polygon points="0,40 60,0 130,12 154,72 92,114 18,98" fill="rgba(249,115,22,0.15)"/>
    <circle cx="76" cy="58" r="4" fill="#F97316" stroke="none"/>
  </g>

  <text x="942" y="316" font-size="9.5" letter-spacing="2" fill="#F97316" text-anchor="end">TOKEN ID</text>
  <text x="942" y="334" font-size="13" font-weight="700" fill="#fff" text-anchor="end" direction="ltr">— سيتم توليده عند السكّ —</text>
  <text x="942" y="356" font-size="9.5" letter-spacing="2" fill="#F97316" text-anchor="end">CONTRACT</text>
  <text x="942" y="374" font-size="11" font-weight="600" fill="#fff" text-anchor="end" direction="ltr">0xSARH…721A · ethereum-sepolia</text>

  <!-- Decree input + checkbox + action buttons -->
  <rect x="518" y="408" width="442" height="132" rx="14" fill="#fff" stroke="#E5E7EB"/>

  <text x="942" y="436" font-size="12" font-weight="700" fill="#0F172A" text-anchor="end">رقم قرار الاعتماد</text>
  <rect x="538" y="446" width="402" height="36" rx="8" fill="#FAFAF9" stroke="#E5E7EB"/>
  <text x="930" y="468" font-size="13" font-weight="600" fill="#0F172A" text-anchor="end" direction="ltr">DCR-2026-1142</text>

  <rect x="538" y="494" width="14" height="14" rx="3" fill="#fff" stroke="#0F172A" stroke-width="1.5"/>
  <text x="556" y="506" font-size="6" font-weight="900" fill="#0F172A">✓</text>
  <text x="942" y="506" font-size="11" fill="#0F172A" text-anchor="end">سكّ الرخصة فوراً على البلوكتشين بعد الاعتماد</text>
  <text x="942" y="524" font-size="10" fill="rgba(15,23,42,0.55)" text-anchor="end">سيتم تثبيت بيانات التعريف على IPFS، ثم استدعاء mint() على عقد ERC-721.</text>

  <!-- Below the two columns: blockchain status panel -->
  <rect x="20" y="560" width="940" height="146" rx="14" fill="#fff" stroke="#E5E7EB"/>
  <text x="942" y="592" font-size="13" font-weight="700" fill="#0F172A" text-anchor="end">حالة عملية السكّ</text>
  <line x1="20" y1="604" x2="960" y2="604" stroke="#E5E7EB"/>

  <!-- Step pills -->
  <g font-size="10.5">
    <!-- 1 PAdES -->
    <circle cx="884" cy="640" r="14" fill="#0891B2"/>
    <text x="884" y="644" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="864" y="644" fill="#0F172A" text-anchor="end">توقيع PAdES للسند</text>

    <!-- 2 SSI -->
    <circle cx="704" cy="640" r="14" fill="#0891B2"/>
    <text x="704" y="644" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="684" y="644" fill="#0F172A" text-anchor="end">إصدار شهادة SSI VC</text>
    <line x1="848" y1="640" x2="720" y2="640" stroke="#0891B2" stroke-width="2"/>

    <!-- 3 IPFS -->
    <circle cx="544" cy="640" r="14" fill="#F97316"/>
    <text x="544" y="644" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="524" y="644" fill="#0F172A" text-anchor="end">تثبيت metadata.json على IPFS</text>
    <line x1="688" y1="640" x2="560" y2="640" stroke="#0891B2" stroke-width="2" stroke-dasharray="4 3"/>

    <!-- 4 Mint -->
    <circle cx="320" cy="640" r="14" fill="#fff" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="320" y="644" font-size="11" font-weight="700" fill="rgba(15,23,42,0.45)" text-anchor="middle">4</text>
    <text x="300" y="644" fill="rgba(15,23,42,0.55)" text-anchor="end">استدعاء mint() على العقد</text>
    <line x1="528" y1="640" x2="336" y2="640" stroke="rgba(15,23,42,0.18)" stroke-width="2" stroke-dasharray="4 3"/>

    <!-- 5 Confirm -->
    <circle cx="120" cy="640" r="14" fill="#fff" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="120" y="644" font-size="11" font-weight="700" fill="rgba(15,23,42,0.45)" text-anchor="middle">5</text>
    <text x="100" y="644" fill="rgba(15,23,42,0.55)" text-anchor="end">حفظ tokenId + tx_hash + إشعار</text>
    <line x1="304" y1="640" x2="136" y2="640" stroke="rgba(15,23,42,0.18)" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <text x="942" y="688" font-size="10.5" fill="rgba(15,23,42,0.6)" text-anchor="end">شبكة السكّ الافتراضية: ethereum-sepolia (قابلة للتغيير من إعدادات الإدارة) · Gas estimate ≈ 0.0021 ETH</text>

  <!-- Action buttons -->
  <rect x="20" y="724" width="940" height="60" rx="14" fill="#fff" stroke="#E5E7EB"/>
  <rect x="40" y="738" width="120" height="32" rx="8" fill="#fff" stroke="#E5E7EB"/>
  <text x="100" y="758" font-size="12" font-weight="600" fill="#0F172A" text-anchor="middle">رفض الاعتماد</text>

  <rect x="170" y="738" width="160" height="32" rx="8" fill="#fff" stroke="#E5E7EB"/>
  <text x="250" y="758" font-size="12" font-weight="600" fill="#0F172A" text-anchor="middle">طلب توضيح</text>

  <rect x="700" y="734" width="240" height="40" rx="10" fill="#0F172A"/>
  <text x="820" y="758" font-size="12.5" font-weight="700" fill="#F97316" text-anchor="middle">اعتماد وإصدار NFT ↗</text>

  <text x="20" y="808" font-size="10" fill="rgba(15,23,42,0.4)" direction="ltr">Wireframe · License (NFT) issuance · Department Manager</text>
</svg>
