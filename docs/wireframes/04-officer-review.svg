<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="system-ui,'Segoe UI',Tahoma,sans-serif" direction="rtl">
  <rect width="1200" height="760" fill="#FAFAF9"/>

  <!-- Sidebar -->
  <rect x="980" y="0" width="220" height="760" fill="#0F172A"/>
  <rect x="980" y="0" width="220" height="760" fill="rgba(255,255,255,0.04)"/>
  <text x="1170" y="48" font-size="16" font-weight="700" fill="#F97316" text-anchor="end">صَرح</text>
  <line x1="1000" y1="86" x2="1180" y2="86" stroke="rgba(255,255,255,0.08)"/>
  <rect x="996" y="160" width="190" height="34" rx="8" fill="rgba(249,115,22,0.18)"/>
  <text x="1170" y="181" font-size="12" font-weight="600" fill="#F97316" text-anchor="end">طابور المراجعة</text>
  <text x="1170" y="220" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">القرارات</text>

  <!-- Topbar -->
  <rect x="0" y="0" width="980" height="62" fill="#fff" stroke="#E5E7EB"/>
  <text x="950" y="32" font-size="13" fill="#0F172A" text-anchor="end">صَرح / طابور المراجعة / مراجعة طلب</text>

  <!-- Hero details card -->
  <rect x="22" y="84" width="936" height="160" rx="14" fill="#fff" stroke="#E5E7EB"/>
  <rect x="936" y="100" width="6" height="128" fill="#F97316"/>

  <text x="920" y="118" font-size="20" font-weight="700" fill="#0F172A" text-anchor="end">PRP-2026-0438</text>
  <text x="800" y="118" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">
    <tspan>قيد المراجعة</tspan>
  </text>
  <rect x="730" y="104" width="120" height="22" rx="11" fill="#f59e0b"/>
  <text x="790" y="120" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">قيد المراجعة</text>

  <text x="920" y="148" font-size="12" fill="rgba(15,23,42,0.65)" text-anchor="end">سكني · طرابلس · حي الأندلس · مساحة 425.5 م²</text>

  <text x="920" y="180" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">المالك:</text>
  <text x="870" y="180" font-size="11" font-weight="600" fill="#0F172A" text-anchor="end">علي محمد بلعيد</text>

  <text x="920" y="200" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">رقم القطعة:</text>
  <text x="855" y="200" font-size="11" font-weight="600" fill="#0F172A" text-anchor="end" direction="ltr">2174 / B-37</text>

  <text x="920" y="220" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">تاريخ الإرسال:</text>
  <text x="846" y="220" font-size="11" font-weight="600" fill="#0F172A" text-anchor="end" direction="ltr">02/05/2026</text>

  <text x="430" y="180" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">المستندات:</text>
  <text x="380" y="180" font-size="11" font-weight="600" fill="#0891B2" text-anchor="end">2 ملفات ✓</text>

  <text x="430" y="200" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">عقارات متداخلة:</text>
  <text x="349" y="200" font-size="11" font-weight="600" fill="#0F172A" text-anchor="end">لا يوجد</text>

  <text x="430" y="220" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">المساحة من المضلّع:</text>
  <text x="324" y="220" font-size="11" font-weight="600" fill="#0891B2" text-anchor="end">425.50 م² · مطابقة</text>

  <!-- Map preview -->
  <rect x="498" y="262" width="460" height="320" rx="14" fill="#fff" stroke="#E5E7EB"/>
  <text x="940" y="290" font-size="13" font-weight="700" fill="#0F172A" text-anchor="end">الموقع على الخريطة</text>
  <rect x="514" y="304" width="430" height="262" rx="10" fill="#e8eef0"/>
  <line x1="514" y1="380" x2="944" y2="370" stroke="#fff" stroke-width="6" opacity="0.7"/>
  <line x1="514" y1="500" x2="944" y2="510" stroke="#fff" stroke-width="6" opacity="0.7"/>
  <polygon points="660,400 820,395 825,490 670,500" fill="rgba(245,158,11,0.25)" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="743" cy="447" r="11" fill="#f59e0b"/>
  <circle cx="743" cy="447" r="22" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- Decision card -->
  <rect x="22" y="262" width="458" height="478" rx="14" fill="#fff" stroke="#E5E7EB"/>
  <text x="462" y="290" font-size="13" font-weight="700" fill="#0F172A" text-anchor="end">القرار</text>
  <text x="462" y="306" font-size="10.5" fill="rgba(15,23,42,0.55)" text-anchor="end">اختر الإجراء المناسب وأدخل المرجع.</text>

  <!-- Three buttons toggle -->
  <g font-size="11.5" font-weight="700">
    <rect x="40" y="324" width="138" height="60" rx="10" fill="#fff" stroke="rgba(8,145,178,0.6)" stroke-width="2"/>
    <text x="109" y="350" fill="#0891B2" text-anchor="middle">✓</text>
    <text x="109" y="370" fill="#0891B2" text-anchor="middle">اعتماد</text>

    <rect x="186" y="324" width="138" height="60" rx="10" fill="#fff" stroke="#E5E7EB"/>
    <text x="255" y="350" fill="rgba(15,23,42,0.55)" text-anchor="middle">⚠</text>
    <text x="255" y="370" fill="rgba(15,23,42,0.65)" text-anchor="middle">يحتاج توضيح</text>

    <rect x="332" y="324" width="138" height="60" rx="10" fill="#fff" stroke="#E5E7EB"/>
    <text x="401" y="350" fill="rgba(15,23,42,0.55)" text-anchor="middle">✗</text>
    <text x="401" y="370" fill="rgba(15,23,42,0.65)" text-anchor="middle">رفض</text>
  </g>

  <!-- Decree number -->
  <text x="462" y="416" font-size="10.5" fill="rgba(15,23,42,0.6)" text-anchor="end">رقم القرار</text>
  <rect x="40" y="426" width="430" height="36" rx="8" fill="#fff" stroke="#E5E7EB"/>
  <text x="460" y="449" font-size="12" fill="#0F172A" text-anchor="end" direction="ltr">DCR-2026-1142</text>

  <!-- Note -->
  <text x="462" y="486" font-size="10.5" fill="rgba(15,23,42,0.6)" text-anchor="end">ملاحظات (اختياري عند الاعتماد)</text>
  <rect x="40" y="496" width="430" height="100" rx="8" fill="#fff" stroke="#E5E7EB"/>
  <text x="460" y="518" font-size="11" fill="rgba(15,23,42,0.5)" text-anchor="end">المساحة المحسوبة من المضلّع تطابق المساحة المُدخلة. لا توجد عقارات متداخلة.</text>

  <!-- Audit reminder -->
  <rect x="40" y="612" width="430" height="40" rx="8" fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.3)"/>
  <circle cx="440" cy="632" r="9" fill="#F97316"/>
  <text x="440" y="636" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">i</text>
  <text x="420" y="630" font-size="10" fill="rgba(15,23,42,0.7)" text-anchor="end">سيُسجَّل القرار في سجلّ التدقيق فوراً</text>
  <text x="420" y="643" font-size="9.5" fill="rgba(15,23,42,0.55)" text-anchor="end">— لا يمكن التعديل بعد الاعتماد</text>

  <!-- Submit button -->
  <rect x="40" y="676" width="430" height="46" rx="10" fill="#0F172A"/>
  <text x="255" y="704" font-size="13" font-weight="700" fill="#F97316" text-anchor="middle">حفظ القرار + توقيع PAdES + إصدار VC</text>

  <text x="20" y="745" font-size="10" fill="rgba(15,23,42,0.4)" direction="ltr">Wireframe · Officer review</text>
</svg>
