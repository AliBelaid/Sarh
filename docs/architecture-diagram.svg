<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-label="Sarh Architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4D77A"/>
      <stop offset="100%" stop-color="#9B7A1E"/>
    </linearGradient>
    <linearGradient id="redLayer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A8000E" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="greenLayer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A7234" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blackLayer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.4"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" font-family="'Amiri', serif"
