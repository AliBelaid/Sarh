  <g transform="translate(120, 850)">
    <rect width="200" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="15" font-weight="700" fill="#F97316">السجل المدني</text>
    <text x="100" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">National Civil Registry</text>
    <text x="100" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">تحقق من الجد · العائلة</text>
    <text x="100" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">(مرحلة لاحقة)</text>
