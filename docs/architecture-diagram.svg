    <text x="100" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="15" font-weight="700" fill="#F97316">مصلحة المساحة</text>
    <text x="100" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Survey Authority</text>
    <text x="100" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">رقم القطعة · الإحداثيات</text>
    <text x="100" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">شهادات المساحة</text>
  </g>

  <g transform="translate(560, 850)">
    <rect width="200" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="15" font-weight="700" fill="#F97316">قارئة NFC</text>
    <text x="100" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">ACR122U / Mobile NFC</text>
    <text x="100" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">تحقق من البطاقة</text>
    <text x="100" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">قراءة UID + Signature</text>
  </g>

  <g transform="translate(780, 850)">
    <rect width="200" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="15" font-weight="700" fill="#F97316">طابعة بطاقات</text>
    <text x="100" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Zebra ZC350 / Evolis</text>
    <text x="100" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">طباعة + ترميز NFC</text>
    <text x="100" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">CardPress SDK</text>
  </g>

  <g transform="translate(1000, 850)">
    <rect width="200" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="15" font-weight="700" fill="#F97316">SMS Gateway</text>
    <text x="100" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Libyana / Almadar</text>
    <text x="100" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">OTP · إشعارات</text>
    <text x="100" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#aaa">تأكيد الطلبات</text>
  </g>

  <g transform="translate(1220, 850)">
    <rect width="100" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="50" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="13" font-weight="700" fill="#F97316">GIS</text>
    <text x="50" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Mapbox</text>
    <text x="50" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="10" fill="#aaa">خرائط</text>
    <text x="50" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="10" fill="#aaa">الموقع</text>
