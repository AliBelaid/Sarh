    <text x="140" y="25" text-anchor="middle" font-family="'Amiri', serif" font-size="16" font-weight="700" fill="#F97316">REST / GraphQL API</text>
    <text x="140" y="46" text-anchor="middle" font-family="monospace" font-size="11" fill="#aaa">Node.js · NestJS · TypeScript</text>
  </g>

  <g transform="translate(420, 385)">
