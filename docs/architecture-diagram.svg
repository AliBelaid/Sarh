    <text x="110" y="50" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Encrypted Buckets</text>
    <line x1="20" y1="60" x2="200" y2="60" stroke="#F97316" stroke-opacity="0.3"/>
    <text x="20" y="78" font-family="'Amiri', serif" font-size="11" fill="#aaa">• صور المواطنين</text>
    <text x="20" y="93" font-family="'Amiri', serif" font-size="11" fill="#aaa">• الوثائق العقارية (PDF)</text>
    <text x="20" y="108" font-family="'Amiri', serif" font-size="11" fill="#aaa">• شهادات المساحة</text>
    <text x="20" y="123" font-family="'Amiri', serif" font-size="11" fill="#aaa">• صور القطع العقارية</text>
  </g>

