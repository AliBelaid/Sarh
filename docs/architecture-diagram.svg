    <text x="20" y="93" font-family="'Amiri', serif" font-size="11" fill="#aaa">• فحص تعارض الإحداثيات</text>
    <text x="20" y="108" font-family="'Amiri', serif" font-size="11" fill="#aaa">• توقيع رقمي للوثائق</text>
    <text x="20" y="123" font-family="'Amiri', serif" font-size="11" fill="#aaa">• إشعارات</text>
  </g>

  <!-- Realtime -->
  <g transform="translate(1140, 575)">
    <rect width="180" height="140" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="90" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="16" font-weight="700" fill="#F97316">Realtime</text>
    <text x="90" y="50" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Postgres CDC</text>
    <line x1="20" y1="60" x2="160" y2="60" stroke="#F97316" stroke-opacity="0.3"/>
    <text x="20" y="78" font-family="'Amiri', serif" font-size="11" fill="#aaa">• حالة الطلب</text>
    <text x="20" y="93" font-family="'Amiri', serif" font-size="11" fill="#aaa">• إشعارات فورية</text>
    <text x="20" y="108" font-family="'Amiri', serif" font-size="11" fill="#aaa">• مزامنة الموظفين</text>
    <text x="20" y="123" font-family="'Amiri', serif" font-size="11" fill="#aaa">• تحديث القرارات</text>
  </g>

  <!-- Arrows down to External -->
  <line x1="700" y1="740" x2="700" y2="790" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrow)"/>

