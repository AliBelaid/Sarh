  <rect x="60" y="340" width="1280" height="120" rx="6" fill="url(#blackLayer)" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.6"/>
  <text x="80" y="368" font-family="'Amiri', serif" font-size="16" fill="url(#gold)" font-weight="700">طبقة الخدمات — API &amp; Realtime Layer</text>

  <g transform="translate(120, 385)">
