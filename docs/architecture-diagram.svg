  <line x1="480" y1="280" x2="480" y2="330" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="280" x2="730" y2="330" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="980" y1="280" x2="980" y2="330" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1230" y1="280" x2="1230" y2="330" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrow)"/>

