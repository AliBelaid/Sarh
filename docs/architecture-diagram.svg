    <text x="20" y="93" font-family="'Amiri', serif" font-size="11" fill="#aaa">• properties · property_geometry</text>
    <text x="20" y="108" font-family="'Amiri', serif" font-size="11" fill="#aaa">• documents · registrations</text>
    <text x="20" y="123" font-family="'Amiri', serif" font-size="11" fill="#aaa">• officers · audit_log · ssi_credentials</text>
  </g>

