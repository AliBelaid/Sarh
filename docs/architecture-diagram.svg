  <text x="700" y="78" text-anchor="middle" font-family="'Cormorant Garamond', serif"
        font-size="16" fill="#F97316" letter-spacing="4">SARH · SYSTEM ARCHITECTURE</text>

  <!-- ============ LAYER 1: CLIENTS ============ -->
  <rect x="60" y="120" width="1280" height="160" rx="6" fill="url(#redLayer)" stroke="#DC2626" stroke-width="1" stroke-opacity="0.6"/>
  <text x="80" y="148" font-family="'Amiri', serif" font-size="16" fill="#DC2626" font-weight="700">طبقة العملاء — Client Layer</text>

  <!-- Mobile App -->
  <g transform="translate(120, 170)">
    <rect width="220" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="18" font-weight="700" fill="#F97316">تطبيق المواطن</text>
    <text x="110" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#F4D77A">Flutter · iOS / Android</text>
    <text x="110" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">SSI Wallet · NFC Reader · GPS</text>
    <text x="110" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">رفع وثائق · إشعارات SignalR</text>
  </g>

  <!-- Web Citizen Portal -->
  <g transform="translate(370, 170)">
    <rect width="220" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="18" font-weight="700" fill="#F97316">بوابة المواطن</text>
    <text x="110" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#F4D77A">Angular 17+ · RTL</text>
    <text x="110" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">تسجيل عقار · متابعة طلبات</text>
    <text x="110" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">عرض الوثائق العقارية</text>
  </g>

  <!-- Officer Web App -->
  <g transform="translate(620, 170)">
    <rect width="220" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="18" font-weight="700" fill="#F97316">لوحة الموظف</text>
    <text x="110" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#F4D77A">Angular · Officer Portal</text>
    <text x="110" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">مراجعة · موافقة / رفض</text>
    <text x="110" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">تعارض الإحداثيات · تقارير</text>
  </g>

  <!-- Data Entry / ID Issuer -->
  <g transform="translate(870, 170)">
    <rect width="220" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="18" font-weight="700" fill="#F97316">محطة إصدار الهوية</text>
    <text x="110" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#F4D77A">Angular · Web Cam · NFC</text>
    <text x="110" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">إدخال بيانات المواطن</text>
    <text x="110" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">طباعة بطاقة + ترميز NFC</text>
  </g>

  <!-- Admin Console -->
  <g transform="translate(1120, 170)">
    <rect width="220" height="90" rx="6" fill="#0F172A" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Amiri', serif" font-size="18" font-weight="700" fill="#F97316">لوحة المسؤول</text>
    <text x="110" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#F4D77A">Angular · Super Admin</text>
    <text x="110" y="68" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">صلاحيات · موظفين</text>
    <text x="110" y="82" text-anchor="middle" font-family="'Amiri', serif" font-size="12" fill="#aaa">تدقيق · إعدادات</text>
