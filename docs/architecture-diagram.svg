    <text x="20" y="93" font-family="'Amiri', serif" font-size="11" fill="#aaa">• ربط بالهوية الرقمية</text>
    <text x="20" y="108" font-family="'Amiri', serif" font-size="11" fill="#aaa">• Biometric (Mobile)</text>
    <text x="20" y="123" font-family="'Amiri', serif" font-size="11" fill="#aaa">• Row Level Security</text>
