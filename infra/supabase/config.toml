# Sijilli — Supabase local dev configuration
# Run: supabase start (from repo root, after `supabase init` if not already done)

project_id = "sijilli"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.citizen_photos]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png"]

[storage.buckets.citizen_signatures]
public = false
file_size_limit = "1MiB"
allowed_mime_types = ["image/png"]

[storage.buckets.property_documents]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png"]

[storage.buckets.deeds]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]

[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = [
    "http://localhost:4200",
    "http://localhost:4201",
    "http://localhost:4202",
    "http://localhost:4203",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false   # signup is officer-invite only

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false

[experimental]
orioledb_version = ""
