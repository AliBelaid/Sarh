# Sijilli — per-app nginx config baked into each Angular container.
# Mounted at /etc/nginx/conf.d/default.conf by every web-* Dockerfile.
# This server only renders the SPA shell; TLS, HSTS, /api proxying, and
# rate limiting all live on the edge nginx in conf.d/sijilli.conf.

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # The edge proxy strips the Host header and forwards X-Forwarded-* — we
    # don't redirect to HTTPS here because the inner container only ever
    # speaks plaintext on the docker network.

    # Long-cache hashed Angular assets. Angular emits content-hashed
    # filenames, so we can cache aggressively without staleness risk.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Service worker and manifest must never be cached — they pin the app
    # version and would otherwise trap users on a stale build.
    location = /ngsw.json        { add_header Cache-Control "no-store" always; try_files $uri =404; }
    location = /ngsw-worker.js   { add_header Cache-Control "no-store" always; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-store" always; try_files $uri =404; }

    # SPA fallback — every unknown path renders the app shell so Angular's
    # router can take over. /index.html itself is no-store so a redeploy
    # invalidates instantly.
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    # Container-local healthcheck endpoint used by HEALTHCHECK + compose.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Hide nginx version from error pages and Server header (set globally
    # in nginx.conf via server_tokens off, repeated here for defense in depth).
    server_tokens off;

    # Tiny gzip — brotli would be better but stays optional to avoid
    # depending on a non-default nginx module.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
}
