# Sijilli — edge vhosts. Five hostnames terminate here:
#
#   sijilli.ly             → web-citizen (citizen portal)
#   verify.sijilli.ly      → public deed verification SPA + /verify/* API
#   officer.sijilli.ly     → web-officer
#   issuer.sijilli.ly      → web-id-issuer
#   admin.sijilli.ly       → web-admin
#
# All five share the same /api/v1 reverse proxy to the NestJS service.
# All five upgrade plain HTTP to HTTPS with HSTS preload.

# ---- Upstreams -------------------------------------------------------------
# Resolved against the docker-compose network; each name is a service.
upstream sijilli_api      { server api:3000          max_fails=3 fail_timeout=10s; keepalive 32; }
upstream sijilli_citizen  { server web-citizen:80    max_fails=3 fail_timeout=10s; keepalive 16; }
upstream sijilli_officer  { server web-officer:80    max_fails=3 fail_timeout=10s; keepalive 16; }
upstream sijilli_issuer   { server web-id-issuer:80  max_fails=3 fail_timeout=10s; keepalive 16; }
upstream sijilli_admin    { server web-admin:80      max_fails=3 fail_timeout=10s; keepalive 16; }

# ---- Common header maps ----------------------------------------------------
# Lift Connection through to upstream so keepalive works.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# CSP — separate maps per app so we can relax for the verify site (Mapbox
# tiles + GeoJSON inlined) without loosening the others.
map $host $sijilli_csp {
    default                 "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests";
    verify.sijilli.ly       "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.tiles.mapbox.com https://api.mapbox.com; connect-src 'self' https://api.mapbox.com https://*.tiles.mapbox.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests";
    issuer.sijilli.ly       "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:9090 ws://127.0.0.1:9090; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'";
}

# ---- Boilerplate proxy block (re-included by every location that proxies) -
# /etc/nginx/proxy_params ships in nginx:alpine; we override here so the
# config is self-contained and immune to upstream image changes.

# ---- 1) HTTP → HTTPS redirect for every Sijilli host ----------------------
server {
    listen      80;
    listen      [::]:80;
    server_name sijilli.ly verify.sijilli.ly officer.sijilli.ly issuer.sijilli.ly admin.sijilli.ly;

    # ACME http-01 challenges from certbot land here. Paths under
    # /.well-known/acme-challenge are served from a shared volume.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 2) Citizen portal — sijilli.ly ---------------------------------------
server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         sijilli.ly;

    ssl_certificate     /etc/letsencrypt/live/sijilli.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sijilli.ly/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/sijilli.ly/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self), usb=()" always;
    add_header Content-Security-Policy   $sijilli_csp                                    always;
    add_header Cross-Origin-Opener-Policy "same-origin"                                  always;

    limit_conn conn_zone 50;

    include /etc/nginx/conf.d/_api_proxy.inc;

    location / {
        proxy_pass http://sijilli_citizen;
        include /etc/nginx/conf.d/_proxy_common.inc;
    }
}

# ---- 3) Public verify portal — verify.sijilli.ly --------------------------
server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         verify.sijilli.ly;

    ssl_certificate     /etc/letsencrypt/live/verify.sijilli.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verify.sijilli.ly/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/verify.sijilli.ly/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy   $sijilli_csp                                    always;
    add_header Cross-Origin-Opener-Policy "same-origin"                                  always;

    limit_conn conn_zone 100;

    # /verify/* is the unauthenticated lookup endpoint. CLAUDE.md mandates
    # rate limiting it — burst=20 nodelay lets a quick page-load fan out
    # cleanly without batching, while the 30r/m steady state stops scraping.
    location ~ ^/(api/v1/)?verify/ {
        limit_req zone=verify_zone burst=20 nodelay;
        proxy_pass http://sijilli_api;
        include /etc/nginx/conf.d/_proxy_common.inc;
    }

    include /etc/nginx/conf.d/_api_proxy.inc;

    # The verify portal is served by the citizen Angular app (it ships a
    # /verify route). Routing the host to the same upstream means we don't
    # need a separate container.
    location / {
        proxy_pass http://sijilli_citizen;
        include /etc/nginx/conf.d/_proxy_common.inc;
    }
}

# ---- 4) Officer portal — officer.sijilli.ly -------------------------------
server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         officer.sijilli.ly;

    ssl_certificate     /etc/letsencrypt/live/officer.sijilli.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/officer.sijilli.ly/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/officer.sijilli.ly/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)"  always;
    add_header Content-Security-Policy   $sijilli_csp                                    always;
    add_header Cross-Origin-Opener-Policy "same-origin"                                  always;

    limit_conn conn_zone 50;

    include /etc/nginx/conf.d/_api_proxy.inc;

    location / {
        proxy_pass http://sijilli_officer;
        include /etc/nginx/conf.d/_proxy_common.inc;
    }
}

# ---- 5) ID issuer station — issuer.sijilli.ly -----------------------------
# This vhost is browsed from kiosks on the office LAN; it still terminates
# TLS publicly so officers can also access from laptops with VPN.
server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         issuer.sijilli.ly;

    ssl_certificate     /etc/letsencrypt/live/issuer.sijilli.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/issuer.sijilli.ly/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/issuer.sijilli.ly/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    # Camera + USB needed for live photo capture and ACR122U over WebUSB.
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), usb=(self)" always;
    add_header Content-Security-Policy   $sijilli_csp                                    always;
    add_header Cross-Origin-Opener-Policy "same-origin"                                  always;
    # COEP+COOP enable SharedArrayBuffer used by the local NFC helper.
    add_header Cross-Origin-Embedder-Policy "credentialless"                              always;

    # Allow larger uploads here — issuer station posts photo + signature.
    client_max_body_size 30m;

    limit_conn conn_zone 30;

    include /etc/nginx/conf.d/_api_proxy.inc;

    location / {
        proxy_pass http://sijilli_issuer;
        include /etc/nginx/conf.d/_proxy_common.inc;
    }
}

# ---- 6) Admin console — admin.sijilli.ly ----------------------------------
server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         admin.sijilli.ly;

    ssl_certificate     /etc/letsencrypt/live/admin.sijilli.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sijilli.ly/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.sijilli.ly/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy   $sijilli_csp                                    always;
    add_header Cross-Origin-Opener-Policy "same-origin"                                  always;

    limit_conn conn_zone 20;

    include /etc/nginx/conf.d/_api_proxy.inc;

    location / {
        proxy_pass http://sijilli_admin;
        include /etc/nginx/conf.d/_proxy_common.inc;
    }
}
