# Sijilli — edge nginx top-level config. Loaded by the `sijilli-edge`
# container; vhosts live in conf.d/sijilli.conf.

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version on error pages and the Server header.
    server_tokens off;

    # Real-IP — we sit behind the host's public IP. If you put this behind
    # a load balancer, list its CIDR(s) here.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time uct="$upstream_connect_time" '
                      'urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;
    server_names_hash_bucket_size 128;

    # Body size cap. Photo + signature uploads from the ID issuer wizard
    # are the largest payload the API receives — keep this above their
    # combined limit (apps/api enforces a stricter per-field cap).
    client_max_body_size 25m;
    client_body_buffer_size 1m;
    client_body_timeout 30s;
    send_timeout 30s;

    # Gzip — brotli would be better, but staying on the stock nginx image.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml application/wasm
        image/svg+xml;

    # ---- Rate limit zones --------------------------------------------------
    # CLAUDE.md mandates rate limits on /auth/* and /verify/*. We define
    # zones here and apply them in the vhost.
    #
    # Sized for a single edge node serving up to ~50k unique clients before
    # the zone wraps; bump if traffic grows.
    limit_req_zone   $binary_remote_addr zone=auth_zone:10m   rate=10r/m;
    limit_req_zone   $binary_remote_addr zone=verify_zone:10m rate=30r/m;
    limit_req_zone   $binary_remote_addr zone=api_zone:10m    rate=120r/m;
    limit_req_status 429;
    limit_conn_zone  $binary_remote_addr zone=conn_zone:10m;
    limit_conn_status 429;

    # ---- TLS defaults ------------------------------------------------------
    # Modern profile (Mozilla "intermediate", TLS 1.2 + 1.3 only). Per-vhost
    # we still load the cert + key.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:TLS:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # DH parameters for DHE ciphersuites. Generated once at deploy time:
    #   openssl dhparam -out /etc/nginx/dhparam.pem 2048
    # Made optional so the container can boot without it during bootstrap.
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ---- Shared proxy header set ------------------------------------------
    # Reused by every reverse_proxy block via `include /etc/nginx/proxy_params`.
    # nginx:alpine ships /etc/nginx/proxy_params already; we extend it inline
    # in the vhost below to avoid version skew.

    include /etc/nginx/conf.d/*.conf;
}
